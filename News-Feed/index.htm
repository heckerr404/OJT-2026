<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live News Feed</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <h1>Live News Feed</h1>
  <div id="categories">
    <button class="cat-btn active" onclick="loadCategory('technology', this)">Technology</button>
    <button class="cat-btn" onclick="loadCategory('general', this)">General</button>
    <button class="cat-btn" onclick="loadCategory('sports', this)">Sports</button>
    <button class="cat-btn" onclick="loadCategory('business', this)">Business</button>
    <button class="cat-btn" onclick="loadCategory('entertainment', this)">Entertainment</button>
  </div>
  <div id="spinner"></div>
  <p id="error-msg"></p>
  <div id="news-grid"></div>
  <script src="script.js"></script>
</body>
</html>
